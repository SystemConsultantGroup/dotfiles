# Ashell configuration
# Inherits design from waybar: light theme (#ddd bg, #222 text), top bar
# Hot-reloads automatically on file change

log_level = "warn"

# Output on all monitors
outputs = "All"

# Bar position: top of screen
position = "Top"
layer = "Top"

enable_esc_key = true

[modules]
left = [ "Workspaces" ]
center = [ "Tempo" ]
right = [ "Settings" ]

[workspaces]
visibility_mode = "All"
group_by_monitor = false
enable_workspace_filling = true

[tempo]
clock_format = "%Y-%m-%d %H:%M"

[settings]
lock_cmd = "loginctl lock-session"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
battery_format = "IconAndPercentage"
audio_indicator_format = "Icon"
microphone_indicator_format = "Icon"
network_indicator_format = "Icon"
bluetooth_indicator_format = "Icon"
brightness_indicator_format = "Icon"
indicators = [ "IdleInhibitor", "PowerProfile", "Audio", "Microphone", "Bluetooth", "Network", "Vpn", "Battery", "Brightness" ]

[appearance]
# "Solid" style gives a flat, full-width bar (no rounded corners)
style = "Solid"
font_name = "CaskaydiaCove Nerd Font"
scale_factor = 1.0
opacity = 0.95

# Light theme — mirrors waybar's rgba(221, 221, 221, 0.95) bg with #222222 text
primary_color = "#222222"
success_color = "#222222"
text_color = "#222222"
workspace_colors = [ "#000000" ]

[appearance.danger_color]
base = "#e64553"
weak = "#e0af68"

[appearance.background_color]
base = "#dddddd"
weak = "#eeeeee"
strong = "#cccccc"

[appearance.secondary_color]
base = "#bbbbbb"

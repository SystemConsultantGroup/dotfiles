name: Update Hyprland Wiki References

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate references from wiki
        run: bash scripts/generate-references.sh

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet references/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Read wiki version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          source references/.wiki-version
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add references/
          git commit -m "docs: update references from hyprland-wiki ${{ steps.version.outputs.commit }}"
          git push

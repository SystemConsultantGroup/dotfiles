exec-once = kime

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

monitor =,preferred,auto,1

input {
    kb_layout = us
    kb_options = korean:ralt_hangul,korean:rctrl_hanja
}

general {
    gaps_in = 8
    gaps_out = 16
    border_size = 2
    col.active_border = rgb(dddddd)
    col.inactive_border = rgb(444444)
    layout = master
}

animations {
    enabled = false
}

master {
    new_status = slave
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(000000)
}

bind = SUPER, RETURN, exec, alacritty
bind = SUPER, R, exec, rofi -show drun
bind = SUPER, EQUAL, exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = SUPER, Q, killactive
bind = SUPER SHIFT, S, exec, flameshot gui
bind = SUPER, P, exec, pavucontrol
bind = ALT, RETURN, fullscreen
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Focus / Selection (Super + Arrow)
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move Window (Super + Shift + Arrow)
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Resize Window (Super + Ctrl + Arrow)
binde = SUPER CTRL, left, resizeactive, -20 0
binde = SUPER CTRL, right, resizeactive, 20 0
binde = SUPER CTRL, up, resizeactive, 0 -20
binde = SUPER CTRL, down, resizeactive, 0 20

# Workspaces 1-5
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
